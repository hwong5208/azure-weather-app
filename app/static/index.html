<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vancouver Weather | Platform Engineering Showcase</title>
    <!-- Tailwind CSS for sleek, utility-first styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Inter Font -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #0f172a;
            /* Slate 900 for a dark, modern look */
            color: #f8fafc;
        }

        .glass-panel {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .animate-fade-in {
            animation: fadeIn 0.5s ease-out forwards;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* ── Skeleton Loader ─────────────────────────────────── */
        .skeleton {
            background: rgba(51, 65, 85, 0.5);
            border-radius: 0.75rem;
            position: relative;
            overflow: hidden;
        }

        .skeleton::after {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(90deg,
                    transparent 0%,
                    rgba(148, 163, 184, 0.08) 50%,
                    transparent 100%);
            animation: shimmer 1.6s infinite;
        }

        @keyframes shimmer {
            from {
                transform: translateX(-100%);
            }

            to {
                transform: translateX(100%);
            }
        }
    </style>
</head>

<body class="min-h-screen flex items-center justify-center p-4">

    <!-- Background decorative elements -->
    <div
        class="fixed top-[-10%] left-[-10%] w-[40%] h-[40%] rounded-full bg-blue-600/20 blur-[120px] pointer-events-none">
    </div>
    <div
        class="fixed bottom-[-10%] right-[-10%] w-[40%] h-[40%] rounded-full bg-indigo-600/20 blur-[120px] pointer-events-none">
    </div>
    <div
        class="fixed top-[40%] left-[40%] w-[30%] h-[30%] rounded-full bg-teal-500/10 blur-[120px] pointer-events-none">
    </div>

    <!-- Main App Container -->
    <div class="w-full max-w-4xl mx-auto flex flex-col gap-8 relative z-10 p-4 my-auto">

        <!-- ═══════════════════════════════════════════════════════════════ -->
        <!-- SKELETON: Weather Card (visible while loading)                 -->
        <!-- ═══════════════════════════════════════════════════════════════ -->
        <div id="skeleton-weather" class="w-full glass-panel rounded-[2.5rem] p-10 shadow-2xl flex flex-col gap-6">
            <!-- Header -->
            <div class="flex flex-col items-center gap-3">
                <div class="skeleton h-9 w-48 rounded-xl"></div>
                <div class="skeleton h-4 w-32 rounded-lg"></div>
            </div>
            <!-- Big temp -->
            <div class="flex justify-center">
                <div class="skeleton h-20 w-40 rounded-2xl"></div>
            </div>
            <!-- 2x2 detail grid -->
            <div class="grid grid-cols-2 gap-4">
                <div class="skeleton h-16 rounded-2xl"></div>
                <div class="skeleton h-16 rounded-2xl"></div>
                <div class="skeleton h-16 rounded-2xl"></div>
                <div class="skeleton h-16 rounded-2xl"></div>
            </div>
            <!-- Footer row -->
            <div class="flex justify-between pt-4 border-t border-slate-700/30">
                <div class="skeleton h-4 w-28 rounded-lg"></div>
                <div class="skeleton h-4 w-24 rounded-lg"></div>
            </div>
        </div>

        <!-- Current Weather Widget (real — hidden until data loads) -->
        <main
            class="w-full glass-panel rounded-[2.5rem] p-10 shadow-2xl flex flex-col justify-between animate-fade-in hidden"
            id="weather-card">

            <!-- Header -->
            <div class="flex flex-col items-center justify-center mb-8 relative">
                <h1 class="text-4xl font-bold tracking-tight mb-1 text-center">Vancouver, BC</h1>
                <p class="text-slate-400 text-sm text-center" id="vancouver-time">Loading local time...</p>

                <div
                    class="absolute right-0 top-0 w-12 h-12 rounded-full bg-blue-500/10 flex items-center justify-center text-blue-400 border border-blue-500/20">
                    <i data-lucide="cloud-rain" class="w-6 h-6" id="weather-icon"></i>
                </div>
            </div>

            <!-- Main Temp Display -->
            <div class="flex justify-center items-end space-x-3 mb-8">
                <div class="text-7xl font-bold tracking-tighter" id="temperature">--°</div>
                <div class="text-3xl text-slate-400 pb-2">C</div>
            </div>

            <!-- Details Grid -->
            <div class="grid grid-cols-2 gap-4">

                <!-- Apparent Temp -->
                <div class="bg-slate-800/50 rounded-2xl p-4 border border-slate-700/50 flex items-center space-x-3">
                    <i data-lucide="thermometer" class="w-5 h-5 text-indigo-400"></i>
                    <div>
                        <p class="text-xs text-slate-400 font-medium">Feels Like</p>
                        <p class="text-lg font-semibold" id="apparent-temp">--°C</p>
                    </div>
                </div>

                <!-- Humidity -->
                <div class="bg-slate-800/50 rounded-2xl p-4 border border-slate-700/50 flex items-center space-x-3">
                    <i data-lucide="droplets" class="w-5 h-5 text-blue-400"></i>
                    <div>
                        <p class="text-xs text-slate-400 font-medium">Humidity</p>
                        <p class="text-lg font-semibold" id="humidity">--%</p>
                    </div>
                </div>

                <!-- Wind -->
                <div class="bg-slate-800/50 rounded-2xl p-4 border border-slate-700/50 flex items-center space-x-3">
                    <i data-lucide="wind" class="w-5 h-5 text-teal-400"></i>
                    <div>
                        <p class="text-xs text-slate-400 font-medium">Wind</p>
                        <p class="text-lg font-semibold" id="wind">-- km/h</p>
                    </div>
                </div>

                <!-- Rain -->
                <div class="bg-slate-800/50 rounded-2xl p-4 border border-slate-700/50 flex items-center space-x-3">
                    <i data-lucide="cloud-drizzle" class="w-5 h-5 text-purple-400"></i>
                    <div>
                        <p class="text-xs text-slate-400 font-medium">Precipitation</p>
                        <p class="text-lg font-semibold" id="precipitation">-- mm</p>
                    </div>
                </div>

            </div>

            <!-- System Architecture & Telemetry -->
            <div class="mt-8 pt-6 border-t border-slate-700/50 flex flex-col space-y-4 text-xs text-slate-400">
                <div class="flex items-center justify-between">
                    <div class="flex items-center space-x-2">
                        <span
                            class="w-2 h-2 rounded-full bg-emerald-500 animate-pulse shadow-[0_0_8px_rgba(16,185,129,0.8)]"></span>
                        <span class="font-medium">System Online</span>
                    </div>
                    <div class="flex items-center space-x-4">
                        <div class="flex items-center space-x-1">
                            <i data-lucide="users" class="w-3 h-3 text-blue-400"></i>
                            <span id="telemetry-visits" class="font-bold text-white">--</span> Visits
                        </div>
                        <div class="flex items-center space-x-1">
                            <i data-lucide="fingerprint" class="w-3 h-3 text-purple-400"></i>
                            <span id="telemetry-unique" class="font-bold text-white">--</span> Unique
                        </div>
                    </div>
                </div>

                <div class="flex items-center justify-between">
                    <div class="flex items-center space-x-3 font-medium font-mono text-[10px] tracking-wider uppercase">
                        <span>Azure</span>
                        <span class="w-1 h-1 rounded-full bg-slate-600"></span>
                        <span>FastAPI</span>
                        <span class="w-1 h-1 rounded-full bg-slate-600"></span>
                        <span>Docker</span>
                    </div>
                    <div class="flex items-center space-x-3 font-medium text-[11px]">
                        <a id="grafana-link" href="#" target="_blank"
                            class="hover:text-blue-400 transition-colors flex items-center space-x-1">
                            <i data-lucide="line-chart" class="w-3 h-3"></i>
                            <span>Grafana Dashboard</span>
                        </a>
                    </div>
                </div>
            </div>
        </main>

        <!-- ═══════════════════════════════════════════════════════════════ -->
        <!-- SKELETON: Forecast Card (visible while loading)                -->
        <!-- ═══════════════════════════════════════════════════════════════ -->
        <div id="skeleton-forecast" class="w-full glass-panel rounded-[2.5rem] p-10 shadow-2xl flex flex-col gap-6">
            <div class="flex flex-col items-center gap-3">
                <div class="skeleton h-8 w-44 rounded-xl"></div>
                <div class="skeleton h-4 w-28 rounded-lg"></div>
            </div>
            <!-- 5 faux forecast cards -->
            <div class="flex gap-5 overflow-hidden">
                <div class="skeleton flex-none w-36 h-44 rounded-2xl"></div>
                <div class="skeleton flex-none w-36 h-44 rounded-2xl"></div>
                <div class="skeleton flex-none w-36 h-44 rounded-2xl"></div>
                <div class="skeleton flex-none w-36 h-44 rounded-2xl"></div>
                <div class="skeleton flex-none w-36 h-44 rounded-2xl"></div>
            </div>
        </div>

        <!-- 14-Day Forecast Section (real — hidden until data loads) -->
        <section class="w-full glass-panel rounded-[2.5rem] p-10 shadow-2xl flex flex-col animate-fade-in hidden"
            id="forecast-card" style="animation-delay: 0.1s;">
            <div class="flex flex-col items-center justify-center mb-8">
                <h2 class="text-3xl font-bold tracking-tight text-white mb-2 text-center">Extended Outlook</h2>
                <p class="text-slate-400 text-sm text-center">14-Day Trend Analysis</p>
            </div>

            <!-- Horizontal scrolling container -->
            <div
                class="flex-grow flex items-center bg-slate-900/40 rounded-3xl p-6 border border-slate-700/50 relative group">
                <!-- Left Scroll Button -->
                <button onclick="scrollForecast('left')"
                    class="absolute left-2 z-10 w-10 h-10 flex items-center justify-center rounded-full bg-slate-800/90 hover:bg-slate-700 text-slate-300 border border-slate-600/50 shadow-xl backdrop-blur-md transition-all cursor-pointer opacity-0 group-hover:opacity-100 focus:opacity-100">
                    <i data-lucide="chevron-left" class="w-5 h-5"></i>
                </button>

                <div class="flex overflow-x-auto gap-5 pb-4 px-2 snap-x no-scrollbar w-full scroll-smooth"
                    id="forecast-container" style="scrollbar-width: none;">
                    <!-- JS will inject daily cards here -->
                </div>

                <!-- Right Scroll Button -->
                <button onclick="scrollForecast('right')"
                    class="absolute right-2 z-10 w-10 h-10 flex items-center justify-center rounded-full bg-slate-800/90 hover:bg-slate-700 text-slate-300 border border-slate-600/50 shadow-xl backdrop-blur-md transition-all cursor-pointer opacity-0 group-hover:opacity-100 focus:opacity-100">
                    <i data-lucide="chevron-right" class="w-5 h-5"></i>
                </button>
            </div>
        </section>

        <!-- Close Main App Container -->
    </div>

    <style>
        /* Hide scrollbar for Chrome, Safari and Opera */
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }

        /* Hide scrollbar for IE, Edge and Firefox */
        .no-scrollbar {
            -ms-overflow-style: none;
            /* IE and Edge */
            scrollbar-width: none;
            /* Firefox */
        }
    </style>

    <!-- Error State -->
    <div id="error"
        class="hidden fixed inset-0 z-50 flex flex-col items-center justify-center space-y-4 text-red-400 bg-slate-900/90 backdrop-blur-md">
        <div class="bg-red-950/30 p-8 rounded-3xl border border-red-900/50 flex flex-col items-center shadow-2xl">
            <i data-lucide="alert-triangle" class="w-12 h-12 mb-4 text-red-500"></i>
            <p class="text-base font-medium" id="error-message">Failed to load weather data.</p>
        </div>
    </div>

    <script>
        // Initialize Lucide Icons
        lucide.createIcons();

        // Weather Code Mapping (WMO Code)
        // https://open-meteo.com/en/docs
        function getWeatherIcon(code, isDay) {
            if (code === 0) return isDay ? 'sun' : 'moon'; // Clear sky
            if (code === 1 || code === 2 || code === 3) return 'cloud'; // Mainly clear, partly cloudy, and overcast
            if (code >= 45 && code <= 48) return 'align-left'; // Fog
            if (code >= 51 && code <= 55) return 'cloud-drizzle'; // Drizzle
            if (code >= 61 && code <= 65) return 'cloud-rain'; // Rain
            if (code >= 71 && code <= 77) return 'cloud-snow'; // Snow fall
            if (code >= 80 && code <= 82) return 'cloud-rain'; // Rain showers
            if (code >= 85 && code <= 86) return 'cloud-snow'; // Snow showers
            if (code >= 95) return 'cloud-lightning'; // Thunderstorm
            return 'cloud';
        }

        // Horizontal Scroll Helper
        function scrollForecast(direction) {
            const container = document.getElementById('forecast-container');
            const scrollAmount = 320; // Approximately two cards width
            if (direction === 'left') {
                container.scrollBy({ left: -scrollAmount, behavior: 'smooth' });
            } else {
                container.scrollBy({ left: scrollAmount, behavior: 'smooth' });
            }
        }

        // Live Clock for Vancouver Time
        function updateVancouverTime() {
            const timeEl = document.getElementById('vancouver-time');
            if (timeEl) {
                const formatter = new Intl.DateTimeFormat('en-US', {
                    timeZone: 'America/Vancouver',
                    hour: 'numeric',
                    minute: '2-digit',
                    second: '2-digit',
                    hour12: true,
                    weekday: 'short',
                    month: 'short',
                    day: 'numeric'
                });
                timeEl.textContent = formatter.format(new Date());
            }
        }
        setInterval(updateVancouverTime, 1000);
        updateVancouverTime();

        async function fetchWeather() {
            try {
                const response = await fetch('/api/weather');
                if (!response.ok) throw new Error('Network response was not ok');

                const data = await response.json();
                const current = data.current;

                // Update UI elements
                document.getElementById('temperature').textContent = Math.round(current.temperature_2m) + '°';
                document.getElementById('apparent-temp').textContent = Math.round(current.apparent_temperature) + '°C';
                document.getElementById('humidity').textContent = current.relative_humidity_2m + '%';
                document.getElementById('wind').textContent = current.wind_speed_10m + ' km/h';
                document.getElementById('precipitation').textContent = current.precipitation + ' mm';

                // Setup Icon
                const iconName = getWeatherIcon(current.weather_code, current.is_day);
                const iconContainer = document.getElementById('weather-icon').parentElement;
                iconContainer.innerHTML = `<i data-lucide="${iconName}" class="w-6 h-6"></i>`;
                lucide.createIcons(); // re-init new icon

                // Render 14-day Forecast
                if (data.daily && data.daily.time) {
                    const forecastContainer = document.getElementById('forecast-container');
                    forecastContainer.innerHTML = ''; // clear

                    // Map through the 14 days (7 past + 1 current + 6 future approx)
                    data.daily.time.forEach((dateString, index) => {
                        const dateObj = new Date(dateString);

                        // Check if it's today
                        const today = new Date();
                        const isToday = dateObj.getUTCDate() === today.getDate() && dateObj.getUTCMonth() === today.getMonth();
                        const dayName = isToday ? 'Today' : dateObj.toLocaleDateString('en-US', { weekday: 'short' });
                        const dateFormatted = dateObj.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });

                        const maxTemp = Math.round(data.daily.temperature_2m_max[index]);
                        const minTemp = Math.round(data.daily.temperature_2m_min[index]);
                        const dailyCode = data.daily.weather_code[index];
                        const dailyIcon = getWeatherIcon(dailyCode, 1); // assume day icon for daily

                        // Style distinctively if past vs future vs today
                        const cardHtmlClasses = isToday
                            ? 'bg-gradient-to-b from-blue-600/50 to-indigo-700/40 border-blue-400/50 shadow-[0_0_25px_rgba(59,130,246,0.15)] ring-1 ring-blue-400/30'
                            : 'bg-slate-800/60 border-slate-700/50 hover:bg-slate-700/60 hover:border-slate-600/50';

                        const dateTextClass = isToday ? 'text-blue-200' : 'text-slate-400';
                        const textOpacity = dateObj < today && !isToday ? 'opacity-40 grayscale-[50%]' : 'opacity-100';

                        const cardHTML = `
                            <div class="flex-none w-36 p-6 rounded-2xl border ${cardHtmlClasses} ${textOpacity} flex flex-col items-center justify-center snap-center transition-all duration-300 transform hover:-translate-y-2">
                                <p class="text-lg font-bold text-white tracking-wide mb-1">${dayName}</p>
                                <p class="text-xs ${dateTextClass} font-medium mb-5">${dateFormatted}</p>
                                <div class="w-14 h-14 rounded-full bg-slate-950/50 shadow-inner flex items-center justify-center mb-5">
                                    <i data-lucide="${dailyIcon}" class="w-7 h-7 ${isToday ? 'text-blue-300' : 'text-slate-300'}"></i>
                                </div>
                                <div class="flex items-center justify-between w-full px-2">
                                    <span class="text-lg font-bold text-white">${maxTemp}°</span>
                                    <span class="text-sm font-medium text-slate-500">${minTemp}°</span>
                                </div>
                            </div>
                        `;
                        forecastContainer.insertAdjacentHTML('beforeend', cardHTML);
                    });

                    lucide.createIcons(); // render new icons in forecast
                    document.getElementById('forecast-card').classList.remove('hidden');

                    // Auto-scroll to "Today" after a small delay to let render finish
                    setTimeout(() => {
                        const todayCard = forecastContainer.querySelector('.ring-blue-400\\/30');
                        if (todayCard) {
                            // Calculate center position
                            const containerWidth = forecastContainer.offsetWidth;
                            const cardLeft = todayCard.offsetLeft;
                            const cardWidth = todayCard.offsetWidth;
                            forecastContainer.scrollTo({
                                left: cardLeft - (containerWidth / 2) + (cardWidth / 2),
                                behavior: 'smooth'
                            });
                        }
                    }, 500);
                }

                // Transition views: hide skeletons, show real panels with fade-in
                document.getElementById('skeleton-weather').classList.add('hidden');
                document.getElementById('skeleton-forecast').classList.add('hidden');
                document.getElementById('weather-card').classList.remove('hidden');
                document.getElementById('forecast-card').classList.remove('hidden');

            } catch (error) {
                console.error('Error fetching weather:', error);
                document.getElementById('skeleton-weather').classList.add('hidden');
                document.getElementById('skeleton-forecast').classList.add('hidden');
                const errorEl = document.getElementById('error');
                errorEl.classList.remove('hidden');
                errorEl.classList.add('flex');
                document.getElementById('error-message').textContent = 'Microservice unreachable. Please check backend logs.';
            }
        }

        // Fetch Telemetry on load
        async function fetchTelemetry() {
            try {
                const response = await fetch('/api/telemetry');
                if (response.ok) {
                    const data = await response.json();
                    document.getElementById('telemetry-visits').textContent = data.total_visits;
                    document.getElementById('telemetry-unique').textContent = data.unique_ips;
                }
            } catch (e) {
                console.error("Failed to load telemetry data", e);
            }
        }

        // Dynamic Link Resolution
        function setupObservabilityLinks() {
            const host = window.location.hostname;
            const protocol = window.location.protocol;

            // Default to local docker-compose ports if running locally
            let grafanaBaseUri = 'http://localhost:3000';

            // In Azure Container Apps, the Grafana container has a different name prefix.
            // Weather app: ca-yvrweather-dev.purplemoss-...
            // Grafana app:  ca-grafana-yvrweather-dev.purplemoss-...
            if (host !== 'localhost' && host !== '127.0.0.1') {
                grafanaBaseUri = `https://${host.replace('ca-', 'ca-grafana-')}`;
            }

            document.getElementById('grafana-link').href = `${grafanaBaseUri}/d/vancouver-weather-metrics/vancouver-weather-telemetry?orgId=1&refresh=5s`;
        }

        // Fetch on load
        fetchWeather();
        fetchTelemetry();
        setupObservabilityLinks();
    </script>
</body>

</html>
